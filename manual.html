<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLE500 2026MY — Owner's Manual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem('kleTheme');
            if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        /* ========================= THEMES ========================= */
        :root {
            --green: #00d068;
            --green-dim: rgba(0,208,104,0.12);
            --bg: #0c0c0e;
            --card: #111114;
            --text: #d8dce8;
            --text-dim: #565b6e;
            --sidebar-bg: #080809;
            --sidebar-border: #1c1c22;
            --preview-border: #252530;
            --scan-line: rgba(0,208,104,0.03);
        }
        [data-theme="oem-green"] {
            --green:#5dca6a; --green-dim:rgba(93,202,106,0.12);
            --bg:#07130a; --card:#0a1a0d; --text:#c8e8cc; --text-dim:#3d6645;
            --sidebar-bg:#050e07; --sidebar-border:#1a3020; --preview-border:#1a3020;
        }
        [data-theme="blueprint"] {
            --green:#4fc3f7; --green-dim:rgba(79,195,247,0.12);
            --bg:#060e1a; --card:#080f1e; --text:#b8d4f0; --text-dim:#2a4a6a;
            --sidebar-bg:#040a14; --sidebar-border:#0f2040; --preview-border:#0f2040;
        }
        [data-theme="light"] {
            --green:#0d7a3a; --green-dim:rgba(13,122,58,0.08);
            --bg:#eeede8; --card:#f8f7f2; --text:#1a1c22; --text-dim:#9a9ea8;
            --sidebar-bg:#e4e3de; --sidebar-border:#d0cfc8; --preview-border:#d0cfc8;
        }

        /* ========================= BASE ========================= */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                var(--scan-line) 0px, var(--scan-line) 1px,
                transparent 1px, transparent 4px
            );
            pointer-events: none;
            z-index: 9997;
        }

        /* ========================= TOPBAR ========================= */
        #topBar {
            height: 48px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }
        #topBar::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0; height: 1px;
            background: linear-gradient(to right, transparent, var(--green) 30%, var(--green) 70%, transparent);
            opacity: 0.3;
        }
        .topbar-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px; letter-spacing: 2px;
            color: var(--text-dim); text-transform: uppercase;
        }
        .topbar-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--text);
        }
        .topbar-sep { flex-grow: 1; }

        #backToHub {
            display: flex; align-items: center; gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
            color: var(--text-dim); text-decoration: none;
            padding: 4px 10px;
            border: 1px solid var(--sidebar-border); border-radius: 3px;
            transition: all 0.15s; flex-shrink: 0;
        }
        #backToHub:hover { color: var(--green); border-color: var(--green); background: var(--green-dim); }
        #backToHub svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        #downloadBtn {
            display: flex; align-items: center; gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
            color: var(--green); text-decoration: none;
            padding: 4px 12px;
            border: 1px solid var(--green); border-radius: 3px;
            background: var(--green-dim); transition: all 0.15s; flex-shrink: 0;
        }
        #downloadBtn:hover { background: var(--green); color: #000; }
        #downloadBtn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .theme-btn {
            width: 16px; height: 16px; border-radius: 3px;
            border: 1px solid var(--sidebar-border); cursor: pointer;
            transition: all 0.15s; position: relative; flex-shrink: 0;
        }
        .theme-btn:hover { border-color: var(--green); }
        .theme-btn.active::after { content: ''; position: absolute; inset: 3px; border-radius: 1px; background: var(--green); }
        .theme-btn[data-theme="dark"]      { background: #0c0c0e; }
        .theme-btn[data-theme="oem-green"] { background: #07130a; }
        .theme-btn[data-theme="blueprint"] { background: #060e1a; }
        .theme-btn[data-theme="light"]     { background: #eeede8; }

        .lang-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px; font-weight: 600; letter-spacing: 1.5px;
            color: var(--text-dim); background: none;
            border: 1px solid transparent; border-radius: 3px;
            padding: 3px 6px; cursor: pointer; transition: all 0.15s;
        }
        .lang-btn:hover { color: var(--green); border-color: var(--green); }
        .lang-btn.active { color: var(--green); border-color: var(--green); background: var(--green-dim); }

        /* ========================= LAYOUT ========================= */
        #layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ========================= SIDEBAR ========================= */
        #sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* Search */
        #searchWrap {
            padding: 10px 12px;
            border-bottom: 1px solid var(--sidebar-border);
            position: relative;
            flex-shrink: 0;
        }
        #searchInput {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--sidebar-border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 7px 32px 7px 30px;
            outline: none;
            transition: border-color 0.15s;
        }
        #searchInput:focus { border-color: var(--green); }
        #searchInput::placeholder { color: var(--text-dim); }
        #searchIcon {
            position: absolute;
            left: 22px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 12px;
            pointer-events: none;
        }
        #searchClear {
            position: absolute;
            right: 22px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-dim); cursor: pointer;
            font-size: 12px; display: none;
            padding: 2px 4px; border-radius: 2px;
            transition: color 0.15s;
        }
        #searchClear:hover { color: var(--text); }
        #searchClear.visible { display: block; }

        /* Search status */
        #searchStatus {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
            padding: 4px 12px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--sidebar-border);
            display: none;
            flex-shrink: 0;
        }
        #searchStatus.visible { display: block; }

        /* TOC header */
        .sidebar-section-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 8px 14px 6px;
            flex-shrink: 0;
        }

        /* TOC list */
        #tocList {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--sidebar-border) transparent;
        }
        #tocList::-webkit-scrollbar { width: 4px; }
        #tocList::-webkit-scrollbar-track { background: transparent; }
        #tocList::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

        .toc-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding: 5px 14px;
            cursor: pointer;
            transition: background 0.12s;
            border-left: 2px solid transparent;
        }
        .toc-item:hover { background: rgba(255,255,255,0.03); }
        .toc-item.active {
            border-left-color: var(--green);
            background: var(--green-dim);
        }
        .toc-item.active .toc-title { color: var(--green); }
        .toc-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            color: var(--text-dim);
            flex-shrink: 0;
            min-width: 24px;
            text-align: right;
        }
        .toc-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
            transition: color 0.12s;
        }
        .toc-item.sub { padding-left: 26px; }
        .toc-item.sub .toc-title {
            font-size: 10px;
            font-weight: 400;
            color: var(--text-dim);
        }

        /* Search results */
        .search-result {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 7px 14px;
            cursor: pointer;
            transition: background 0.12s;
            border-left: 2px solid transparent;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .search-result:hover { background: rgba(255,255,255,0.03); border-left-color: var(--green); }
        .search-result-page {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            color: var(--green);
            letter-spacing: 1px;
        }
        .search-result-snippet {
            font-size: 10px;
            color: var(--text-dim);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .search-result-snippet mark {
            background: var(--green);
            color: #000;
            border-radius: 2px;
            padding: 0 1px;
        }

        .search-empty {
            padding: 20px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.8;
        }

        /* ========================= MAIN CONTENT ========================= */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* PDF Frame */
        #pdfFrame {
            flex: 1;
            width: 100%;
            border: none;
            background: var(--bg);
        }

        /* No file */
        #noFile {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
            display: none;
        }
        .nofile-icon {
            width: 56px; height: 56px;
            border: 1px solid var(--sidebar-border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card); color: var(--green); opacity: 0.4;
        }
        .nofile-icon svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .nofile-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); opacity: 0.35; }
        .nofile-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-dim); text-align: center; line-height: 1.8; }

        /* ========================= BOTTOM TOOLBAR ========================= */
        #toolbar {
            height: 44px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .tb-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 600; letter-spacing: 1px;
            padding: 5px 10px;
            border: 1px solid var(--sidebar-border); border-radius: 3px;
            background: transparent; color: var(--text-dim); cursor: pointer;
            transition: all 0.15s;
        }
        .tb-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
        .tb-btn:disabled { opacity: 0.25; cursor: default; }
        #pageInput {
            width: 44px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
            text-align: center; background: var(--card);
            border: 1px solid var(--sidebar-border); border-radius: 3px;
            color: var(--text); padding: 4px;
            transition: border-color 0.15s;
        }
        #pageInput:focus { outline: none; border-color: var(--green); }
        #pageTotal { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-dim); }
        .tb-sep { width: 1px; height: 18px; background: var(--sidebar-border); margin: 0 2px; }
    </style>
</head>

// ========================= TOC RENDER =========================
function renderTOC() {
    const list = document.getElementById('tocList');
    list.innerHTML = '';
    TOC.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'toc-item' + (entry.sub ? ' sub' : '');
        div.innerHTML = `<span class="toc-num">${entry.page}</span><span class="toc-title">${entry.title}</span>`;
        div.addEventListener('click', () => goPage(entry.page));
        list.appendChild(div);
    });
    updateActiveTOC();
}

function updateActiveTOC() {
    document.querySelectorAll('.toc-item').forEach((el, i) => {
        const entry = TOC[i];
        if (!entry) return;
        const next  = TOC[i + 1];
        const active = currentPage >= entry.page && (!next || currentPage < next.page);
        el.classList.toggle('active', active);
        if (active) el.scrollIntoView({ block: 'nearest' });
    });
}

// ========================= PDF VIEWER =========================
const frame = document.getElementById('pdfFrame');

function buildUrl(printedPage, zoom) {
    // pdf_page = printed_page + PAGE_OFFSET (2)
    const pdfPage = Math.max(1, printedPage + PAGE_OFFSET);
    return `${PDF_FILE}#page=${pdfPage}&zoom=${zoom}`;
}

function goPage(n) {
    n = Math.max(1, Math.min(TOTAL_PAGES, n));
    currentPage = n;
    // Browsers won't reload iframe if only #fragment changes — blank first
    frame.src = 'about:blank';
    setTimeout(() => {
        frame.src = buildUrl(currentPage, zoomLevel);
    }, 20);
    document.getElementById('pageInput').value = currentPage;
    document.getElementById('btnPrev').disabled  = currentPage <= 1;
    document.getElementById('btnFirst').disabled = currentPage <= 1;
    document.getElementById('btnNext').disabled  = currentPage >= TOTAL_PAGES;
    document.getElementById('btnLast').disabled  = currentPage >= TOTAL_PAGES;
    updateActiveTOC();
}

function zoom(delta) {
    zoomLevel = Math.max(50, Math.min(200, zoomLevel + delta));
    document.getElementById('zoomLbl').textContent = zoomLevel + '%';
    frame.src = buildUrl(currentPage, zoomLevel);
}

function toggleFs() {
    if (!document.fullscreenElement) {
        document.getElementById('main').requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Загружаем локальный PDF
(function() {
    fetch(PDF_FILE, { method: 'HEAD' })
        .then(r => {
            if (r.ok) {
                frame.src = buildUrl(1, 100);
                frame.style.display = 'block';
                document.getElementById('noFile').style.display = 'none';
            } else {
                frame.style.display = 'none';
                document.getElementById('noFile').style.display = 'flex';
            }
        })
        .catch(() => {
            // file:// — пробуем напрямую
            frame.src = buildUrl(1, 100);
            frame.style.display = 'block';
            document.getElementById('noFile').style.display = 'none';
        });
})();

rformance. This product has been manufactured for use in a reasonable and prudent man- ner by a qualified operator and as a vehicle only. Please read this Owner’s Manual carefully before riding so that you will be thoroughly familiar with the proper operation of your motorcycle’s controls, its fea- tures, capabilities, and limitations. This manual offers many safe riding tips, but its purpose is not to provide instruction in all the techniques and skills required to ride a motorcycle safely. Kawasaki strongly recommends that all operators of this ve- hicle enroll in a motorcycle rider training program to attain awareness of the men- tal and physical requirements necessary for safe motorcycle operation. To ensure a long, trouble-free life for your motorcycle, give it the proper care and maintenance described in this manual. For those who would like more de- tailed information on their Kawasaki Motorcycle, a Service Manual is available for purchase from any authorized Kawasaki motorcycle dealer. The Service Manual contains detailed disassembly and maintenance information. Those who plan to","7":"do their own work should, of course, be competent mechanics and possess the special tools described in the Service Manual. Keep this Owner's Manual aboard your motorcycle at all times so that you can refer to it whenever you need information. This manual should be considered a permanent part of the motorcycle and should remain with the motorcycle when it is sold. All rights reserved. No part of this publication may be reproduced without our prior written permission. KAWASAKI MOTORS, LTD. © 2025 Kawasaki Motors, Ltd. Oct. 1, 2025 (1)","8":"Online Owner’s Manual This publication includes the latest information available at the time of printing. However, there may be minor differences between the actual product and illustra- tions and text in this manual. All products are subject to change without prior notice or obligation. Any up- dated information is available in the online Owner's Manual on Kawasaki's website. https://pws. ktivs. net/dispeBook? file=99814-0138&manual_kind=OM&lang_code= EN&mark=KLESOOCTF 998140138EN","9":"Vehicle Information Label You can obtain vehicle information by scanning the right-hand QR code in the la- bel located behind the passenger's seat. a TA030248 NOG A. Vehicle Information Label B. QR Code Since this vehicle information label is an important label that allows to check ve- hicle information, when replace a part with a label attached, or if the label comes off, please keep it in a safe place to avoid losing it. NOTE © QR code is a registered trademark of DENSO WAVE INC. © This label may not be included on all specifications and model years of vehicles.","10":"Emission Control Information To protect the environment in which we all live, Kawasaki has incorporated crankcase emission (1) and exhaust emission (2) control systems in compliance with applicable regulations of the United States Environmental Protection Agency and California Air Resources Board. Additionally, Kawasaki has incorporated an evaporative emission control system (3) in compliance with applicable regulations of the United States Environmental Protection Agency and California Air Resour- ces Board. 1. Crankcase Emission Control System This system eliminates the release of crankcase vapors into the atmosphere. In- stead, the vapors are routed through an oil separator to the intake side of the en- gine. While the engine is operating, the vapors are drawn into the combustion chamber, where they are burned along with the fuel and air supplied by the fuel in- jection system. 2. Exhaust Emission Control System This system reduces the amount of pollutants discharged into the atmosphere by the exhaust of this motorcycle. The fuel, ignition and exhaust systems of this motorcycle have been carefully designed and constructed to ensure an efficient engine with low exhaust pollutant levels. The exhaust system of this model motor- cycle includes a catalytic converter system.","11":"3. Evaporative Emission Control System The evaporative emission control system for this vehicle consists of low perme- ation fuel hoses and fuel tank. 3. Evaporative Emission Control System (California) Vapors caused by fuel evaporation in the fuel system are not vented into the at- mosphere. Instead, fuel vapors are routed into the running engine to be burned, or stored in a canister when the engine is stopped. High Altitude Performance Adjustment Information High Altitude adjustment is not required. Maintenance and Warranty Proper maintenance is necessary to ensure that your motorcycle will continue to have low emission levels. This Owner’s Manual contains those maintenance rec- ommendations for your motorcycle. Those items identified by the Periodic Mainte- nance Chart are necessary to ensure compliance with the applicable standards. As the owner of this motorcycle, you have the responsibility to make sure that the recommended maintenance is carried out according to the instructions in this Owner's Manual at your own expense.","12":"The Kawasaki Limited Emission Control System Warranty requires that you re- turn your motorcycle to an authorized Kawasaki dealer for remedy under warranty. Please read the warranty carefully, and keep it valid by complying with the owner's obligations it contains. You should keep a maintenance record for your motorcycle. To assist you in keeping this record, we have provided space in the end of book where an author- ized dealer, or someone equally competent, can record the maintenance. You should also retain copies of maintenance work orders, bills, etc., as verification of this maintenance. Tampering With Noise Control System Prohibited Federal law prohibits the following acts or the causing thereof: (1) the removal or rendering inoperative by any person other than for purposes of maintenance, repair, or replacement, of any device or element of design incorporated into any new vehicle for the purpose of noise control prior to its sale or delivery to the ulti- mate purchaser or while it is in use, or (2) the use of the vehicle after such device or element of design has been removed or rendered inoperative by any person. Among those acts presumed to constitute tampering are the acts listed below: e Replacement of the original exhaust system or muffler with a component not in compliance with Federal regulations. e Removal of the muffler(s) or any internal portion of the muffler(s). e Removal of the air box or air box cover.","13":"e Modifications to the muffler(s) or air intake system by cutting, drilling, or other means if such modifications result in increased noise levels.","14":"TABLE OF CONTENTS SAFETY INFORMATION ot Serial Number Locations. Read Owner's Manual mA Location of Labels... Training 17 Location of Parts (KLE500C) Daily Checks and Periodic Location of Parts (KLES00D) Maintenance 17 Meter Instruments (KLE500C: Loading and Accessories Indicators Information -18 Speedometer/Tachometer Passenger. Ad Display Setting. Baggage and Luggage. -20 Features .... Accessories. -20 Meter Instruments (KLE500D: Other Load.. 21 Background Color Change If You are Involved in an Ambient Brightness Senso! Accident ... +21 Indicators...........:.6+ : Safe Operation 22 Speedometer/Tachometer Carbon Monoxide Hazard -22 Features ............ Fueling ..... 23 Multifunction Display Never Ride with Drugs or Multifunction Display Alcohol .23 Resetting .. Protective Gear and Clothin: 23 Menu Mode Safe Riding Techniques... .24 Keys... - 101 Additional Considerations for Ignition Switch/Steering Lock - 102 High Speed Operation . . 26 Right Handlebar Switches... - 104 GENERAL INFORMATION . -28 Starter Button @ . = 104 Specifications 28 Engine Stop Switch . - 104","15":"Left Handlebar Switches. 105 ABS 126 Dimmer Switch.. 105 Turn off ABS function. 129 Horn Button b> 105 Stopping the Engine .. 130 Stopping the Motorcycle in an Turn Signal Switch Emergency 130 ies aarane ean eunsauercemes a colorless, odorless poisonous gas. Inhaling carbon monoxide can cause serious brain injury or death. DO NOT run the engine in enclosed areas. Operate only in a well-venti- lated area.","184":"184 APPENDIX Z\ WARNING Gasoline is extremely flammable and can be explosive under certain con- ditions, creating the potential for serious burns. e Turn the ignition switch off. e Do not smoke. e Make sure the area is well ventilated and free from any source of flame or sparks; this includes any appliance with a pilot light. Z\ WARNING Gasoline is a toxic substance. Dispose of gasoline properly. Contact your local authorities for approved disposal methods. e Clean the entire vehicle thoroughly. e Run the engine for about five minutes to warm the oil, shut it off, and drain the engine oil. (see page 144 Z\ WARNING Engine oil is a toxic substance. Dispose of used oil properly. Contact your local authorities for approved disposal methods or possible recycling.","185":"APPENDIX 185 e Putin fresh engine oil. e Empty the fuel from the fuel tank using a pump or syphon. e Remove the spark plugs and add fogging oil into the combustion chambers. If the spark plugs cannot be removed, take the motorcycle to an authorized Kawa- saki dealer. e Set the motorcycle on a stand so that both wheels are raised off the ground. (If this cannot be done, put boards under the front and rear wheels to keep damp- ness away from the tire rubber.) ¢ Spray oil on all unpainted metal surfaces to prevent rusting. Avoid getting oil on rubber parts or in the brakes. e Lubricate the drive chain and all the cables. e Remove the battery, and store it where it will not be exposed to direct sunlight, moisture, or freezing temperatures. During storage it should be given a slow charge (one ampere or less) about once a month. Keep the battery well charged especially during cold weather. Tie plastic bag over the muffler to prevent moisture from entering. e Puta cover over the motorcycle to keep dust and dirt from collecting on it. Preparation after Storage e Remove the plastic bag from the muffler. Charge the battery if necessary and install the battery in the motorcycle. Fill the fuel tank with fresh fuel. Check all the points listed in the Daily Checks section. (see page 135)","186":"186 APPENDIX e Lubricate the pivots, bolts, and nuts. Troubleshooting Guide If any warning indicators go on or blink, see the Meter Instruments section for proper action. The following trouble shooting guide may also help you in case you experience any of the listed problems. If these checks don’t help you to solve the situation, consult an authorized Kawasaki dealer. If the starter turns but the engine does not start: e Try turning the ignition switch off and on again. Check the fuel level in the tank. e Try refilling with fresh fuel if the vehicle has been stored for a while. e Check the battery voltage. If the starter does not turn: Check the ignition switch is turned on. e Check the engine stop switch. Check the transmission is in neutral. e Check the battery voltage. Check the battery terminals are tightly attached. e Check the fuse.","187":"APPENDIX 187 If the engine stalls: e Check the clutch is engaged/disengaged correctly. e Check the side stand is up. Check the engine is warmed up enough. e Check the fuel level in the tank. e Try refilling with fresh fuel if the vehicle has been stored for a while. e Check the idling speed is not too low. Your Warranty/Owner Satisfaction Welcome to the Kawasaki family! Congratulations on buying your Kawasaki vehicle. You’ve chosen a great, high- quality product with state-of-the-art features and built to Kawasaki's high stand- ards. Your satisfaction is important to your authorized Kawasaki dealer and to Ka- wasaki Motors Corp., U.S.A. Here is some important information regarding your vehicle’s limited warranty. Frequently Asked Questions What is a Limited Warranty? The most important thing to know about your warranty is that it protects you from manufacturing defects in material or workmanship during the warranty period. You can find the warranty period in the Kawasaki Limited Warranty Certificate your","188":"188 APPENDIX Kawasaki dealer provided to you at the time of sale. The warranty does not cover the cost of regularly-scheduled maintenance. The warranty also does not apply to the normal wear of items such as tires, brake pads, transmission drive belts, chains, sprockets, etc. What is the Kawasaki Protection Plus? Much of the warranty coverage offered by the limited warranty can be extended by purchasing the Kawasaki Protection Plus (KPP). See your Kawasaki dealer or go to Kawasaki.com for more information if you don’t already have the KPP. What Am | Responsible For? You are responsible for maintaining your vehicle according to the maintenance schedule shown in this owner’s manual. You are responsible for notifying your dealer immediately if there is a problem, and you, as the owner, will need to authorize the dealer to inspect the unit. You will be responsible for paying for routine maintenance, including the first scheduled service. You can have the required servicing done by your Kawasaki dealer (recommended) or an equally-qualified service facility. You can also do your own maintenance work if you have the proper tools, service references, and me- chanical skills. However, if a failure is found to be caused by improper servicing, it would not be covered by the limited warranty.","189":"APPENDIX 189 You may purchase a Kawasaki Service Manual and any necessary special tools directly from your Kawasaki dealer. You will be responsible for paying for repairs needed because of an accident, to replace worn parts such as tires, chains, brakes, and for repairs needed because of a lack of maintenance, misuse or racing. Whether you do it yourself or take your vehicle to a Kawasaki dealer, be sure to record your service in the Maintenance Record section of this Owner’s Manual. Keep all receipts for the service and/or items necessary to perform the mainte- nance so that in the event of a failure you can document the service history. What Are The Dealership’s Responsibilities? Your Kawasaki dealer offers a wide range of services, parts, accessories, and information on your product and on Kawasaki. Each dealer is independently owned and operated and is responsible for the dealership’s operations, its repair, warranty, and service work, and its personnel. Your dealer is responsible for completing the set up and pre-delivery service of your new Kawasaki vehicle. The dealership should also explain its operation, maintenance, and warranty provisions so you understand them at the time of pur- chase or at any other time you have questions.","190":"190 APPENDIX The dealership is responsible for inspecting your Kawasaki vehicle if there is a failure, investigating the cause of the problem, and getting any needed authoriza- tion from Kawasaki if the repair is one that will be covered by the limited warranty. The dealership will also file all necessary paperwork. The dealership is responsi- ble for correctly completing any necessary repairs, whether they are covered by the limited warranty or not. How Do | Get Warranty Service? If there is a problem with your vehicle within the limited warranty period, you will need to schedule a service appointment and provide any maintenance records to an authorized Kawasaki dealer for inspection and diagnosis. You can go to any Kawasaki dealer for warranty repairs. Your Kawasaki dealer will inspect your ve- hicle and give you the results of the inspection. The dealer will perform the repairs at no cost to you if it is determined that the problem is covered by the warranty. Kawasaki will work with your dealer to resolve any warranty issues. No author- ization for warranty work can be given until your vehicle has been inspected by a Kawasaki dealer. What if | am not Satisfied With My Warranty Service? If you aren't satisfied with your dealership’s repair work or operations, it is best to discuss the situation with the appropriate dealership manager. If you have al- ready done this, then contact the dealership’s owner or general manager to re- quest a review of the issue.","191":"APPENDIX 191 If you are unable to resolve a problem after consulting with the dealership man- agement and need further assistance, contact Kawasaki Motors Corp., U.S.A. at the address below. Please be certain to provide the model, vehicle identification number (VIN), mileage or hours of use, accessories, dates that events occurred and what action has been taken by both you and your dealer. Include the name and address of the dealership. To assist us in resolving your inquiry, please include copies of related receipts and any other pertinent information including the name of the dealership personnel with whom you have been working. Upon receipt of your correspondence, Kawasaki Motors Corp., U.S.A. will contact the dealership and work with it in resolving your problem. Want to Contact Kawasaki? This owner's manual should answer most of your questions about your Kawasa- ki. Your Kawasaki dealer should either be able to answer any other questions you might have immediately or be able to find the answer for you. Please send your correspondence to: Consumer Services Kawasaki Motors Corp., U.S.A. P.O. Box 25252 Santa Ana, CA 92799-5252 (949) 460-5688","192":"192 APPENDIX Reporting Safety Defects (For Products Sold in the United States of America, District of Columbia, and U.S. Territories Only) If you believe that your vehicle has a defect which could cause a crash or could cause injury or death, you should immediately inform the National Highway Traffic Safety Administration (NHTSA) in addition to notifying Kawasaki Motors Corpora- tion, U.S.A. If NHTSA receives similar complaints, it may open an investigation, and if it finds that a safety defect exists in a group of vehicles, it may order a recall and remedy campaign. However, NHTSA cannot become involved in individual problems be- tween you, your dealer, or Kawasaki Motors Corporation, U.S.A. To contact NHTSA, you may either call the Auto Safety Hotline toll-free at 1- 800-424-9393 (or 366-0123 in Washington, D.C. area) or write to: NHTSA, U.S. Department of Transportation, Washington, D.C. 20590. You can also obtain other information about motor vehicle safety from the Hotline.","193":"APPENDIX 193 Environmental Protection To help preserve the environment, properly discard used batteries, tires, oils and fluids, or other vehicle components that you might dispose of in the future. Consult your authorized Kawasaki dealer or local environmental waste agency for their proper disposal procedure. This also applies to disposal of the entire vehicle at the end of its life. Location of DFl System Diagnostic Connector The DFI system diagnostic connector is located under the rider's seat. IP 15910768 22.6 LY A. DFI System Diagnostic Connector","194":"194 APPENDIX Vehicle Data Recordings This vehicle’s ECU stores certain data to assist in problem diagnosis, and for other purposes such as periodic technical inspection, regulatory compliance, and research and development. Although the recorded data varies according to the vehicle model and region, the main information types are as follows: e Data about the vehicle's status and settings. e Performance of the engine and electric control equipment on the engine and chassis. e Information related to the fuel injection system and emissions. The vehicle's ECU does not record conversations or images. This data can only be collected when the Kawasaki special diagnostic tool is connected to the vehicle, such as when maintenance checks or other service pro- cedures are performed. The acquired information will not be disclosed to a third party except in following cases: e With the consent of the vehicle owner or user e Incase of a legal request by a government agency or judicial body","195":"APPENDIX 195 e For various research purposes using processed information that do not identify the vehicle owner, user, or individual vehicle. Event Data Recorder In common with many other vehicle manufacturers, Kawasaki has equipped this motorcycle with an event data recorder (EDR). The purpose of this device is to re- cord data that assists with understanding of how some of the vehicle’s systems were performing during a short period of time immediately before and during an accident or similar event involving minor damage. Due to accident variables, all vehicle performance data may not be stored on the EDR. NOTE o During normal riding, data is recorded but not saved unless the vehicle is in- volved in an accident event. o At no time other than in the event of an accident or similar event involving minor damage is it possible for EDR data to be stored for retrieval. o Depending on the type of accident event, it is possible that the EDR may not re- cord some or all of the data, or it may not record if the EDR is damaged. © This device does not collect or store personal data or information (e.g. name, gender, age).","196":"196 APPENDIX The EDRin this vehicle is designed to record only data that is relevant to the ve- hicle’s running condition at the time of an accident like, but not limited to, vehicle speed, engine crankshaft rotational speed and throttle opening, etc. This data can help provide a better understanding for both the rider and the manufacturer of how the vehicle was performing at the time of an accident or near accident-like situation. To access information on an EDR, special equipment and access to the EDR is required. Kawasaki will not share EDR information without obtaining your consent, unless required by government authorities, or acting pursuant to lawful authority.","197":"APPENDIX 197 Canada: Regulatory Information USA: Each radio frequency device installed in the vehicle conforms to the requirements and Each radio frequency device installed in the standards oft he regulation below: // ========================= FULL-TEXT SEARCH =========================
async function doSearch(query) {
    if (!query || query.length < 2) {
        renderTOC();
        document.getElementById('searchStatus').classList.remove('visible');
        document.getElementById('tocLabel').textContent = _t.tocLabel;
        return;
    }

    const q    = query.toLowerCase();
    const list = document.getElementById('tocList');
    const stat = document.getElementById('searchStatus');
    const lbl  = document.getElementById('tocLabel');

    lbl.textContent = '⌕ ' + query;
    list.innerHTML  = '';

    // — TOC hits —
    const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    const tocHits = TOC.filter(e => e.title.toLowerCase().includes(q));

    // — Full-text hits —
    const txtHits = [];
    const seen = new Set(tocHits.map(e => e.page));
    for (const [pgStr, text] of Object.entries(PAGE_TEXT)) {
        const pg = parseInt(pgStr);
        const ltext = text.toLowerCase();
        const idx = ltext.indexOf(q);
        if (idx === -1) continue;
        if (seen.has(pg)) continue;
        seen.add(pg);
        const s = Math.max(0, idx - 55);
        const e2 = Math.min(text.length, idx + query.length + 55);
        let snip = (s > 0 ? '…' : '') + text.slice(s, e2) + (e2 < text.length ? '…' : '');
        snip = snip.replace(re, m => `<mark>${m}</mark>`);
        txtHits.push({ page: pg, snip });
    }

    if (tocHits.length === 0 && txtHits.length === 0) {
        list.innerHTML = `<div class="search-empty">${_t.noResults}<br><small>"${query}"</small></div>`;
        stat.textContent = _t.noResults;
        stat.classList.add('visible');
        return;
    }

    if (tocHits.length > 0) {
        const h = document.createElement('div');
        h.className = 'sidebar-section-label';
        h.style.cssText = 'margin-top:4px;margin-bottom:2px';
        h.textContent = 'Содержание';
        list.appendChild(h);
        tocHits.forEach(r => {
            const div = document.createElement('div');
            div.className = 'toc-item' + (r.sub ? ' sub' : '');
            div.innerHTML = `<span class="toc-num">${r.page}</span>` +
                            `<span class="toc-title">${r.title.replace(re, m=>`<mark>${m}</mark>`)}</span>`;
            div.addEventListener('click', () => goPage(r.page));
            list.appendChild(div);
        });
    }

    if (txtHits.length > 0) {
        const h2 = document.createElement('div');
        h2.className = 'sidebar-section-label';
        h2.style.cssText = 'margin-top:10px;margin-bottom:2px';
        h2.textContent = 'В тексте';
        list.appendChild(h2);
        txtHits.slice(0, 60).forEach(r => {
            const div = document.createElement('div');
            div.className = 'search-result';
            div.innerHTML = `<span class="search-result-page">${_t.page} ${r.page}</span>` +
                            `<span class="search-result-snippet">${r.snip}</span>`;
            div.addEventListener('click', () => goPage(r.page));
            list.appendChild(div);
        });
    }

    const total = tocHits.length + txtHits.length;
    stat.textContent = `${total} ${_t.results}`;
    stat.classList.add('visible');
}

// ========================= SEARCH INPUT =========================

const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', e => {
    const val = e.target.value.trim();
    searchClear.classList.toggle('visible', val.length > 0);
    clearTimeout(searchTimer);
    if (val.length < 3) {
        renderTOC();
        document.getElementById('searchStatus').classList.remove('visible');
        document.getElementById('tocLabel').textContent = _t.tocLabel;
        return;
    }
    searchTimer = setTimeout(() => doSearch(val), 500);
});

function clearSearch() {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    renderTOC();
    document.getElementById('searchStatus').classList.remove('visible');
    document.getElementById('tocLabel').textContent = _t.tocLabel;
    searchInput.focus();
}

// ========================= KEYBOARD =========================
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(currentPage + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPage(currentPage - 1);
    if (e.key === 'Home')  goPage(1);
    if (e.key === 'End')   goPage(TOTAL_PAGES);
    if (e.key === '+' || e.key === '=') zoom(+25);
    if (e.key === '-')  zoom(-25);
});

// ========================= INIT =========================
renderTOC();
goPage(1);
</script>
